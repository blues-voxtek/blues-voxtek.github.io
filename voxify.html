<!doctype html>
<html lang="en">
<head>
<link rel="icon" href="favicon.png" type="image/png">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>VoxTek</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />

<style>
  :root {
    --accent: #0a84ff;
    --accent-glow: rgba(10, 132, 255, 0.4);
    --glass-bg: rgba(20, 20, 25, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
    --text-muted: #a1a1a6;
    --warning: #ffd60a;
    --warning-glow: rgba(255, 214, 10, 0.35);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    color: var(--text-main);
    background: #000;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://i.imgur.com/Q2YBbzw.png") center/cover no-repeat;
    z-index: -2;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
    z-index: -1;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  }

  .logo { font-weight: 800; font-size: 28px; letter-spacing: -1px; }
  .logo span { color: var(--accent); }

  /* ── Construction Card ── */
  .notice-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
    max-width: 680px;
    width: 100%;
    animation: fadeUp 0.7s cubic-bezier(0.165, 0.84, 0.44, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Striped construction banner */
  .construction-banner {
    width: 100%;
    height: 18px;
    background: repeating-linear-gradient(
      -45deg,
      var(--warning) 0px,
      var(--warning) 18px,
      #1a1a1a 18px,
      #1a1a1a 36px
    );
    border-radius: 14px 14px 0 0;
    flex-shrink: 0;
  }

  .notice-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-top: none;
    border-radius: 0 0 28px 28px;
    padding: 44px 48px 48px;
    backdrop-filter: blur(30px) saturate(180%);
    width: 100%;
  }

  .cone-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .cone-row i {
    font-size: 42px;
    color: var(--warning);
    filter: drop-shadow(0 0 14px var(--warning-glow));
    animation: bob 2.4s ease-in-out infinite;
  }
  .cone-row i:nth-child(2) { animation-delay: 0.4s; }
  .cone-row i:nth-child(3) { animation-delay: 0.8s; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  .notice-title {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 16px;
    color: var(--text-main);
  }

  .notice-title .highlight {
    color: var(--warning);
    text-shadow: 0 0 20px var(--warning-glow);
  }

  .notice-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 36px;
    max-width: 480px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--glass-border);
    margin: 0 auto 36px;
    border-radius: 2px;
  }

  /* Message pill */
  .info-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 214, 10, 0.1);
    border: 1px solid rgba(255, 214, 10, 0.25);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 14px;
    color: var(--warning);
    font-weight: 600;
    margin-bottom: 36px;
    letter-spacing: 0.01em;
  }
  .info-pill i { font-size: 15px; }

  /* Buttons */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    border: none;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 24px var(--accent-glow);
  }
  .btn-primary:hover {
    background: #3a9eff;
    transform: scale(1.04);
    box-shadow: 0 0 36px var(--accent-glow);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.08);
    color: var(--text-main);
    border: 1px solid var(--glass-border);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.14);
    transform: scale(1.04);
    border-color: rgba(255,255,255,0.25);
  }

  .tagline {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 20px;
    letter-spacing: 0.01em;
    opacity: 0.7;
  }

  /* Bottom stripe */
  .construction-banner-bottom {
    width: 100%;
    height: 8px;
    background: repeating-linear-gradient(
      -45deg,
      var(--warning) 0px,
      var(--warning) 10px,
      #1a1a1a 10px,
      #1a1a1a 20px
    );
    border-radius: 0 0 0 0;
    margin-top: 10px;
    opacity: 0.4;
    border-radius: 50px;
  }

  @media (max-width: 600px) {
    .notice-card { padding: 32px 24px 36px; }
    .btn { padding: 13px 22px; font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Vox<span>Tek</span></div>
</header>

<div class="notice-wrap">
  <div class="construction-banner"></div>

  <div class="notice-card">

    <div class="cone-row">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <i class="fa-solid fa-circle-exclamation"></i>
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>

    <div class="notice-title">
      Voxify is no longer displaying<br>
      <span class="highlight">VoxTek Music</span>
    </div>

    <p class="notice-subtitle">
      This page has been retired. You can now listen to all songs alongside their official music videos over on VoxTek Video.
    </p>

    <div class="divider"></div>

    <div class="info-pill">
      <i class="fa-solid fa-film"></i>
      Watch & listen on VoxTek Video
    </div>

    <div class="btn-row">
      <a href="https://blues-voxtek.github.io" class="btn btn-primary">
        <i class="fa-solid fa-house"></i>
        Back to VoxTek
      </a>
    </div>

  </div>

  <div class="construction-banner-bottom"></div>

  <p class="tagline">Hell's Most Popular Music App — Trust Us With Your Eardrums</p>
</div>

</body>
</html>
